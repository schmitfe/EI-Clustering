N_E: 8000
N_I: 2000
Q: 20
focus_count: 1
V_th: 1.0
g: 1.2
p0_ee: 0.3
p0_ie: 0.3
p0_ei: 0.3
p0_ii: 0.3
tau_e: 10.0
tau_i: 5.0
R_Eplus: null
R_j: 0.75
kappa: 1.0
connection_type: poisson
m_X: 0.03
collapse_types: true
initial_activity:
  mode: poisson
  excitatory: null
  inhibitory: null
binary:
  warmup_steps: 200000
  simulation_steps: 3000000
  sample_interval: 10
  batch_size: 200
  state_chunk_size: 0
  population_rate_init: 0.1
  seed: 3
  output_name: activity_trace
  plot_activity: false
analysis:
  enabled: false
  source_type: auto
  dt: null
  bin_size: null
  cluster_selection:
    enabled: false
    mode: all  # all, excitatory, inhibitory, indices, names, group_ids
    indices: []
    names: []
    group_ids: []
  population_filter:
    enabled: false
    source: auto  # auto, rate, counts, binary
    network_state_method: kmeans2  # kmeans2, percentile
    smoothing_sigma_bins: 2
    high_percentile: 75
    modulation_sign: positive  # positive, negative, either
    min_mean_delta: 0.01
    min_effect_size: 0.5
    min_correlation: 0.1
    keep_top_k: null
    min_keep: 1
  preprocessing:
    use_counts: true
    use_rates: false
    smoothing_sigma_bins: 0
    sqrt_transform: true
    zscore: true
    binary_threshold_mode: percentile
    binary_threshold_percentile: 80
    hysteresis:
      enabled: false
      low_percentile: 60
      high_percentile: 80
    temporal_window_bins: 0
  methods:
    threshold_filter:
      enabled: true
      threshold_mode: auto
      threshold_percentile: 80
      min_active_bins: 2
      min_inactive_bins: 2
      min_dwell_bins: 3
      max_gap_bins: 2
      median_filter_width: 0
      force_rethreshold: false
    kmeans_filter:
      enabled: true
      n_states: 8
      feature_type: sqrt_zscore
      n_init: 20
      random_state: 0
      max_iter: 300
      min_dwell_bins: 3
      merge_strategy: previous
      median_filter_width: 0
    changepoint_kmeans:
      enabled: true
      algorithm: pelt
      cost: rbf
      penalty: null
      n_bkps: null
      n_states: 8
      feature_type: smoothed_rates
      n_init: 20
      max_iter: 300
      min_dwell_bins: 3
      merge_strategy: previous
      segment_features:
        mean: true
        max: false
        active_fraction: true
        start_end_difference: false
        duration: false
      random_state: 0
    hmm:
      enabled: true
      emission: auto
      n_states: 8
      num_iters: 100
      num_seeds: 5
      random_state: 0
      feature_type: zscore_rates
  evaluation:
    compute_ground_truth_metrics: true
    boundary_tolerance_bins: [1, 2, 5]
    compute_method_agreement: true
  plotting:
    enabled: true
    save_format: png
    dpi: 150
  state_count_sweep:
    enabled: false
    methods: [kmeans_filter, changepoint_kmeans, hmm]
    smoothing_sigma_bins: [0, 1, 2, 4, 8]
    n_states: [2, 3, 4, 5, 6, 8]
